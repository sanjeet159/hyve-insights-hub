name: Ping Google on Deploy

on:
  push:
    branches: [main]

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Google Search Console
        run: |
          curl "https://www.google.com/ping?sitemap=https://blog.hyvefreelance.com/sitemap.xml"
          echo "Google pinged successfully"

      - name: Ping Bing
        run: |
          curl "https://www.bing.com/ping?sitemap=https://blog.hyvefreelance.com/sitemap.xml"
          echo "Bing pinged successfully"
